<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 루틴 타이머 V4</title>
    <style>
        :root {
            --main-orange: #ff4600;
            --bg-light: #F8FAFC;
            --text-dark: #1E293B;
            --border: #E2E8F0;
        }

        body {
            margin: 0; font-family: 'NanumSquareRound', sans-serif;
            background-color: var(--bg-light); color: var(--text-dark);
            height: 100vh; overflow: hidden;
        }

        button { cursor: pointer; border: none; font-family: inherit; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }

        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }

        /* 플랫 아이콘 스타일 */
        .icon-btn { background: none; padding: 5px; color: #94A3B8; }
        .icon-btn:hover { color: #EF4444; }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* [단계 1: 목록 화면] */
        #screen-list { padding: 50px; align-items: center; overflow-y: auto; }
        .routine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-top: 30px; }
        .routine-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .routine-card:hover { border-color: var(--main-orange); }
        .btn-new { background: var(--main-orange); color: white; padding: 20px 40px; border-radius: 50px; font-size: 20px; font-weight: 800; }

        /* [단계 2: 입력 화면] */
        .top-bar { background: white; padding: 25px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .top-bar button { font-size: 20px; font-weight: bold; background: none; }
        #total-time-display { font-weight: 800; font-size: 32px; color: var(--main-orange); }
        
        /* 버튼 나란히 배치용 컨테이너 */
        .action-btns { display: flex; align-items: center; gap: 20px; }
        
        .editor-content { padding: 40px; overflow-y: auto; flex: 1; align-items: center; display: flex; flex-direction: column; }
        .task-row { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; width: 100%; max-width: 800px; border: 1px solid var(--border); }
        .drag-handle { color: #CBD5E1; cursor: grab; font-size: 20px; padding-right: 10px; user-select: none; }
        .btn-add { background: #F1F5F9; color: #64748B; width: 100%; max-width: 800px; padding: 18px; border-radius: 12px; border: 2px dashed #CBD5E1; margin-top: 10px; font-weight: bold; font-size: 18px; }

        /* [단계 3: 플레이 화면] */
        #screen-play { display: none; grid-template-columns: 350px 1fr; }
        #screen-play.active { display: grid; }
        .sidebar { background: white; border-right: 1px solid var(--border); padding: 40px; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .sidebar-item { padding: 20px; border-radius: 15px; background: #F1F5F9; font-weight: bold; font-size: 18px; cursor: pointer; }
        .sidebar-item.playing { background: var(--main-orange); color: white; transform: scale(1.05); }
        .btn-edit-routine { background: #1A202C; color: white; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 18px; margin-top: auto; }
        
        .play-main { display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; }
        #play-current-name { font-size: 80px; font-weight: 800; margin-bottom: 30px; }
        .timer-val { font-size: 180px; font-weight: 900; color: var(--main-orange); line-height: 1; margin: 40px 0; }
        .play-btns { display: flex; gap: 20px; }
        .btn-circle { width: 100px; height: 100px; border-radius: 50%; font-weight: 800; font-size: 18px; }
    </style>
</head>
<body>

    <div id="screen-list" class="screen active">
        <h1>⏱ 우리 반 루틴 타이머</h1>
        <button class="btn-new" onclick="openEditor()">+ 새로운 루틴 타이머 만들기</button>
        <div id="routine-list-container" class="routine-grid"></div>
    </div>

    <div id="screen-edit" class="screen">
        <div class="top-bar">
            <button onclick="showScreen('screen-list')">← 목록으로</button>
            <div id="total-time-display">총 소요시간: 00:00</div>
            <div class="action-btns">
                <button style="color:#64748B;" onclick="showScreen('screen-list')">취소</button>
                <button style="background:var(--main-orange); color:white; padding:12px 35px; border-radius:12px;" onclick="saveRoutine()">저장</button>
            </div>
        </div>
        <div class="editor-content">
            <input type="text" id="edit-title" placeholder="루틴 제목을 입력하세요" style="width:100%; max-width:800px; font-size:24px; font-weight:800; margin-bottom:30px;">
            <div id="task-editor-list" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
            <button class="btn-add" id="btn-add-task" onclick="addTaskRow()">+ 활동 추가 (최대 10개)</button>
        </div>
    </div>

    <div id="screen-play" class="screen">
        <div class="sidebar">
            <button onclick="showScreen('screen-list')" style="margin-bottom:30px; text-align:left; background:none; font-size:20px; font-weight:bold; padding:0; color:#64748B;">← 목록보기</button>
            <h2 id="play-title" style="margin-bottom:20px; font-size:24px;">루틴 제목</h2>
            <div id="play-sidebar-list" class="sidebar-list"></div>
            <button class="btn-edit-routine" onclick="editFromPlay()">수정하기</button>
        </div>
        <div class="play-main">
            <div id="play-current-name">활동명</div>
            <div id="timer-display" class="timer-val">00:00</div>
            <div class="play-btns">
                <button id="btn-start" class="btn-circle" style="background:var(--main-orange); color:white;" onclick="toggleTimer()">시작</button>
                <button class="btn-circle" style="background:#E2E8F0;" onclick="resetTimer()">초기화</button>
            </div>
        </div>
    </div>

<script>
    let routines = JSON.parse(localStorage.getItem('routines') || '[]');
    let currentRoutine = { title: '', tasks: [] };
    let currentRoutineIdx = -1;
    let timerInterval = null;
    let isPlaying = false;
    let currentTaskIdx = 0;
    let timeLeft = 0;

    const flatTrashIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'screen-list') renderList();
        stopTimer();
    }

    function renderList() {
        const container = document.getElementById('routine-list-container');
        container.innerHTML = '';
        routines.forEach((r, idx) => {
            const card = document.createElement('div');
            card.className = 'routine-card';
            card.innerHTML = `
                <div onclick="startRoutine(${idx})" style="flex:1">
                    <h3 style="margin:0; font-size:22px;">${r.title}</h3>
                    <p style="color:#64748B; margin:8px 0 0 0;">${r.tasks.length}개의 활동</p>
                </div>
                <button class="icon-btn" onclick="deleteRoutine(${idx}, event)">${flatTrashIcon}</button>
            `;
            container.appendChild(card);
        });
    }

    function deleteRoutine(idx, event) {
        event.stopPropagation();
        if(confirm('이 루틴을 삭제할까요?')) {
            routines.splice(idx, 1);
            localStorage.setItem('routines', JSON.stringify(routines));
            renderList();
        }
    }

    function openEditor(idx = -1) {
        currentRoutineIdx = idx;
        if(idx === -1) {
            currentRoutine = { title: '', tasks: [{name:'', min:0, sec:0}] };
            document.getElementById('edit-title').value = '';
        } else {
            currentRoutine = JSON.parse(JSON.stringify(routines[idx]));
            document.getElementById('edit-title').value = currentRoutine.title;
        }
        renderEditorRows();
        showScreen('screen-edit');
    }

    function addTaskRow() {
        syncTasksFromUI();
        if(currentRoutine.tasks.length >= 10) return alert('최대 10개까지만 가능합니다.');
        currentRoutine.tasks.push({name:'', min:0, sec:0});
        renderEditorRows();
    }

    function renderEditorRows() {
        const list = document.getElementById('task-editor-list');
        list.innerHTML = '';
        currentRoutine.tasks.forEach((t, i) => {
            const row = document.createElement('div');
            row.className = 'task-row';
            row.draggable = true;
            row.innerHTML = `
                <span class="drag-handle">☰</span>
                <input type="text" class="input-name" placeholder="활동명" value="${t.name}" style="flex:1">
                <input type="number" class="input-min" value="${t.min}" style="width:60px"> 분
                <input type="number" class="input-sec" value="${t.sec}" style="width:60px"> 초
                <button class="icon-btn" onclick="deleteTask(${i})">${flatTrashIcon}</button>
            `;
            row.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', updateTotalTime);
            });
            row.addEventListener('dragstart', () => row.classList.add('dragging'));
            row.addEventListener('dragend', () => { row.classList.remove('dragging'); syncTasksFromUI(); });
            list.appendChild(row);
        });
        list.addEventListener('dragover', e => {
            e.preventDefault();
            const dragging = document.querySelector('.dragging');
            const afterElement = getDragAfterElement(list, e.clientY);
            if (afterElement == null) list.appendChild(dragging);
            else list.insertBefore(dragging, afterElement);
        });
        updateTotalTime();
    }

    function syncTasksFromUI() {
        const rows = [...document.querySelectorAll('.task-row')];
        currentRoutine.tasks = rows.map(row => ({
            name: row.querySelector('.input-name').value,
            min: parseInt(row.querySelector('.input-min').value || 0),
            sec: parseInt(row.querySelector('.input-sec').value || 0)
        }));
    }

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.task-row:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
            else return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function deleteTask(idx) {
        syncTasksFromUI();
        currentRoutine.tasks.splice(idx, 1);
        renderEditorRows();
    }

    function updateTotalTime() {
        const mins = [...document.querySelectorAll('.input-min')];
        const secs = [...document.querySelectorAll('.input-sec')];
        let totalSec = 0;
        mins.forEach((m, i) => {
            totalSec += (parseInt(m.value || 0) * 60) + parseInt(secs[i].value || 0);
        });
        const m = String(Math.floor(totalSec / 60)).padStart(2, '0');
        const s = String(totalSec % 60).padStart(2, '0');
        document.getElementById('total-time-display').innerText = `총 소요시간: ${m}:${s}`;
    }

    function saveRoutine() {
        syncTasksFromUI();
        currentRoutine.title = document.getElementById('edit-title').value || '제목 없는 루틴';
        if(currentRoutineIdx === -1) routines.push(currentRoutine);
        else routines[currentRoutineIdx] = currentRoutine;
        localStorage.setItem('routines', JSON.stringify(routines));
        showScreen('screen-list');
    }

    function startRoutine(idx) {
        currentRoutineIdx = idx;
        currentRoutine = routines[idx];
        showScreen('screen-play');
        document.getElementById('play-title').innerText = currentRoutine.title;
        renderSidebar();
        jumpToTask(0, false);
    }

    function renderSidebar() {
        const sideList = document.getElementById('play-sidebar-list');
        sideList.innerHTML = currentRoutine.tasks.map((t, i) => 
            `<div class="sidebar-item" id="side-${i}" onclick="jumpToTask(${i}, true)">${t.name}</div>`
        ).join('');
    }

    function jumpToTask(idx, autoPlay) {
        stopTimer();
        currentTaskIdx = idx;
        timeLeft = (currentRoutine.tasks[idx].min * 60) + currentRoutine.tasks[idx].sec;
        updatePlayUI();
        if(autoPlay) toggleTimer();
    }

    function editFromPlay() {
        openEditor(currentRoutineIdx);
    }

    function updatePlayUI() {
        const task = currentRoutine.tasks[currentTaskIdx];
        document.getElementById('play-current-name').innerText = task.name;
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('playing'));
        document.getElementById(`side-${currentTaskIdx}`).classList.add('playing');
        const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
        const s = String(timeLeft % 60).padStart(2, '0');
        document.getElementById('timer-display').innerText = `${m}:${s}`;
    }

    function toggleTimer() {
        if(isPlaying) stopTimer();
        else {
            if(timeLeft <= 0) return;
            isPlaying = true;
            document.getElementById('btn-start').innerText = '일시정지';
            timerInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft < 0) {
                    currentTaskIdx++;
                    if(currentTaskIdx < currentRoutine.tasks.length) {
                        timeLeft = (currentRoutine.tasks[currentTaskIdx].min * 60) + currentRoutine.tasks[currentTaskIdx].sec;
                        updatePlayUI();
                    } else {
                        stopTimer();
                        alert('모든 루틴이 끝났습니다!');
                        return;
                    }
                } else {
                    updatePlayUI();
                }
            }, 1000);
        }
    }

    function stopTimer() {
        isPlaying = false;
        clearInterval(timerInterval);
        const btn = document.getElementById('btn-start');
        if(btn) btn.innerText = '시작';
    }

    function resetTimer() {
        jumpToTask(0, false);
    }

    window.onload = () => renderList();
</script>
</body>
</html>
